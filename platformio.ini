; PlatformIO Project Configuration File
;
;   Build options: build flags, source filter
;   Upload options: custom upload port, speed and extra flags
;   Library options: dependencies, extra library storages
;   Advanced options: extra scripting
;
; Please visit documentation for the other options and examples
; https://docs.platformio.org/page/projectconf.html

[platformio]
name = ESP32-Hardware
description = Librairy for esp32
; Leave default_envs empty so it will build all env
default_envs = 
; build_dir = ${PROJECT_DIR}/.pio/build

[env]
; platform = https://github.com/pioarduino/platform-espressif32/releases/download/stable/platform-espressif32.zip
platform = espressif32
board = az-delivery-devkit-v4
framework = arduino
upload_protocol = esptool
build_type = debug
build_src_filter = 
	+<*>
	+<../examples/${PIOENV}/${PIOENV}.cpp>
upload_speed = 921600
monitor_speed = 921600
extra_scripts = post:scripts/extra_script.py
monitor_filters = 
	colorize
	time
	send_on_enter
	esp32_exception_decoder
monitor_echo = yes
monitor_eol = LF
lib_deps = 
	ESP32_Helper=symlink://../ESP32_Helper
	robotis-git/Dynamixel2Arduino@^0.8.0
	adafruit/Adafruit SSD1306@^2.5.16
	adafruit/Adafruit INA219@^1.2.3

[env:Example1_Screen]
build_unflags = 
	-std=gnu++11
build_flags = 
	-std=c++17
	-std=gnu++17
	-D NO_WIFI

[env:Example2_AX12]
build_unflags = 
	-std=gnu++11
build_flags = 
	-std=c++17
	-std=gnu++17
	-D NO_WIFI
	
[env:Example3_INA219]
build_unflags = 
	-std=gnu++11
build_flags = 
	-std=c++17
	-std=gnu++17
	-D NO_WIFI
	